[workspace]
authors = ["Hieu Nguyen <hieuteo03@gmail.com>"]
channels = ["conda-forge"]
name = "thesis"
platforms = ["win-64", "linux-64"]
version = "0.1.0"

[tasks]
# Data ingestion
data = "python scripts/data_download.py"

# Pipeline execution
workflow = "python main.py"
force = "python main.py --force"

# Cleanup
clean-cache = "rm -f data/processed/*.parquet"
clean-all = "rm -f data/processed/*.parquet && rm -rf models/* results/*"

# Code quality
lint = "ruff check src/"
format = "ruff format src/"
pre-commit = "ruff check src/ && ruff format src/ && pytest tests/ -v -m 'not slow'"

# Testing
test = "pytest tests/ -v --cov=src/thesis --cov-fail-under=80"
test-unit = "pytest tests/unit/ -v -m unit"
test-integration = "pytest tests/integration/ -v -m integration"
test-fast = "pytest tests/ -v -m 'not slow'"

# Interactive visualization
streamlit = "PYTHONPATH=src streamlit run src/thesis/dashboard/main.py --server.port 8501"
dead-code = "vulture src tests --min-confidence 80"

# Documentation
docs-html = "sphinx-build -b html -W docs/source docs/_build/html"
docs-pdf = "bash docs/build_pdf.sh"

# ---------------------------------------------------------------------------
# Dependencies — core pipeline + testing only
# ---------------------------------------------------------------------------
[dependencies]
python = ">=3.13,<3.14"
scikit-learn = ">=1.8.0,<2"
polars = ">=1.39.3,<2"
numpy = ">=2.4.3,<3"
pandas = ">=3.0.1,<4"
matplotlib = ">=3.10.8,<4"
lightgbm = ">=4.6.0,<5"
pyarrow = ">=23.0.1,<24"
tqdm = ">=4.67.3,<5"
ruff = ">=0.15.7,<0.16"
pytest = ">=8.0.0,<9"
joblib = ">=1.4.0,<2"
pytest-cov = ">=7.1.0,<8"
aiohttp = ">=3.13.5,<4"
pytorch = ">=2.10.0,<3"
rich = ">=15.0.0,<16"
numba = ">=0.65.0,<0.66"
accelerate = ">=1.13.0,<2"
streamlit = ">=1.56.0,<2"
bokeh = ">=3.9.0,<4"
jupyter = ">=1.1.1,<2"
ipykernel = ">=7.2.0,<8"
vulture = ">=2.16,<3"
sphinx = ">=8,<9"
sphinx-rtd-theme = ">=3.0.0,<4"
myst-parser = ">=5.0.0,<6"
sphinxcontrib-mermaid = ">=2.0.1,<3"
nodejs = ">=22,<26"

[pypi-dependencies]
backtesting = ">=0.6.5, <0.7"
dukascopy-python = ">=4.0.1, <5"
streamlit-echarts = { version = ">=0.6.0, <0.7", extras = ["pyecharts"] }
