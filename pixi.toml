[workspace]
authors = ["Hieu Nguyen <hieuteo03@gmail.com>"]
channels = ["conda-forge"]
name = "thesis"
platforms = ["win-64", "linux-64"]
version = "0.1.0"

[tasks]
# Data ingestion
data = "python scripts/data_download.py --skip-current-month"

# Pipeline execution
workflow = "python main.py"
force = "python main.py --force"

# Cleanup
clean-cache = "rm -f data/processed/*.parquet"
clean-all = "rm -f data/processed/*.parquet && rm -rf models/* results/*"

# Code quality
lint = "ruff check src/"
format = "ruff format src/"
pre-commit = "ruff check src/ && ruff format src/ && pytest tests/ -v -m 'not slow'"

# Testing
test = "pytest tests/ -v --cov=src/thesis --cov-fail-under=60"
test-unit = "pytest tests/unit/ -v -m unit"
test-integration = "pytest tests/integration/ -v -m integration"
test-fast = "pytest tests/ -v -m 'not slow'"

# Interactive visualization
streamlit = "PYTHONPATH=src streamlit run src/thesis/dashboard.py --server.port 8501"

# ---------------------------------------------------------------------------
# Dependencies — core pipeline + testing only
# ---------------------------------------------------------------------------
[dependencies]
python = ">=3.13,<3.14"
scikit-learn = ">=1.8.0,<2"
polars = ">=1.39.3,<2"
numpy = ">=2.4.3,<3"
pandas = ">=3.0.1,<4"
matplotlib = ">=3.10.8,<4"
lightgbm = ">=4.6.0,<5"
optuna = ">=4.8.0,<5"
pyarrow = ">=23.0.1,<24"
tqdm = ">=4.67.3,<5"
shap = ">=0.51.0,<0.52"
ruff = ">=0.15.7,<0.16"
pytest = ">=8.0.0,<9"
joblib = ">=1.4.0,<2"
pytest-cov = ">=7.1.0,<8"
aiohttp = ">=3.13.5,<4"
pytorch = ">=2.10.0,<3"
rich = ">=15.0.0,<16"
numba = ">=0.65.0,<0.66"
accelerate = ">=1.13.0,<2"

[pypi-dependencies]
backtesting = ">=0.6.5, <0.7"
dukascopy-python = ">=4.0.1, <5"

# ---------------------------------------------------------------------------
# Feature: dashboard (streamlit + visualization extras)
# ---------------------------------------------------------------------------
[feature.dashboard.dependencies]
streamlit = ">=1.56.0,<2"
bokeh = ">=3.9.0,<4"

[feature.dashboard.pypi-dependencies]
streamlit-echarts = { version = ">=0.6.0, <0.7", extras = ["pyecharts"] }

[feature.dashboard.tasks]
streamlit = "PYTHONPATH=src streamlit run src/thesis/dashboard.py --server.port 8501"

# ---------------------------------------------------------------------------
# Feature: dev (notebooks, dead-code analysis)
# ---------------------------------------------------------------------------
[feature.dev.dependencies]
jupyter = ">=1.1.1,<2"
ipykernel = ">=7.2.0,<8"

[feature.dev.pypi-dependencies]
vulture = ">=2.16, <3"

[feature.dev.tasks]
dead-code = "vulture src tests --min-confidence 80"

# ---------------------------------------------------------------------------
# Environments
# ---------------------------------------------------------------------------
[environments]
default = []
dashboard = ["dashboard"]
dev = ["dev"]
all = ["dashboard", "dev"]
