# Minimal thesis configuration.
# Goal: reproducible ML experiment first; trading simulation second.

[data]
symbol = "XAUUSD"
timeframe = "1H"
market_tz = "America/New_York"
start_date = "2013-01-01"
end_date = "2026-03-31"
tick_size = 0.01
contract_size = 100

[validation]
method = "sliding"
train_window_bars = 26280   # ~3 years of H1 bars
test_window_bars = 4380     # ~6 months of H1 bars
step_bars = 4380
purge_bars = 25
embargo_bars = 50
min_train_bars = 10000
wf_optuna_trials = 0        # fixed params: faster and more reproducible

[features]
rsi_period = 14
atr_period = 14
macd_fast = 12
macd_slow = 26
macd_signal = 9
correlation_threshold = 0.75
static_feature_cols = [
  # --- Price structure ---
  "atr_14",
  "price_dist_ratio",
  "close_vs_ema_34",
  "ema34_vs_ema89",
  "pivot_position",
  "price_position_20",
  "atr_percentile",
  # --- Candle / bar structure ---
  "candle_body_ratio",
  "upper_wick_ratio",
  "lower_wick_ratio",
  "gap_ratio",
  # --- Momentum from price ---
  "return_1h",
  "return_4h",
  "high_low_range_20",
  "consecutive_bars",
  # --- Minimal indicators ---
  "rsi_14",
  "macd_hist",
  "trend_strength",
  # --- Session ---
  "sess_london",
  "sess_overlap",
  # --- Volume ---
  "volume_zscore_20",
]

[labels]
atr_multiplier = 2.5
horizon_bars = 24

[model]
architecture = "hybrid"
use_optuna = false
num_leaves = 31
max_depth = 6
learning_rate = 0.02
n_estimators = 500
min_child_samples = 50
subsample = 0.80
feature_fraction = 0.70
reg_lambda = 5.0
early_stopping_rounds = 40

[gru]
feature_cols = ["log_returns", "atr_14", "close_vs_ema_34", "ema34_vs_ema89", "candle_body_ratio", "return_1h", "return_4h", "price_position_20"]
hidden_size = 64
num_layers = 2
sequence_length = 48
dropout = 0.3
learning_rate = 0.0005
batch_size = 256
epochs = 50
patience = 15
min_epochs = 5

[backtest]
initial_capital = 10000.0
leverage = 10
spread_ticks = 35
slippage_ticks = 5
commission_per_lot = 10.0
atr_stop_multiplier = 1.0
atr_tp_multiplier = 2.0
lots_per_trade = 0.1
min_lots = 0.05
max_lots = 0.1
confidence_threshold = 0.55
max_drawdown_cutoff = 0.30

[workflow]
force_rerun = false
random_seed = 2024
n_jobs = -1

[paths]
data_raw = "data/raw/XAUUSD"
data_processed = "data/processed"
ohlcv = "data/processed/ohlcv.parquet"
features = "data/processed/features.parquet"
labels = "data/processed/labels.parquet"
train_data = "data/processed/train.parquet"
val_data = "data/processed/val.parquet"
test_data = "data/processed/test.parquet"
model = "models/lightgbm_model.pkl"
gru_model = "models/gru_model.pt"
predictions = "data/predictions/final_predictions.parquet"
backtest_results = "results/backtest_results.json"
report = "results/thesis_report.md"
